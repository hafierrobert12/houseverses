<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House of Verses · Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #06090f;
  --panel-bg:  #0d1120;
  --blue-deep: #0f1935;
  --blue-mid:  #1a2a5e;
  --blue-glow: #2d4cad;
  --accent:    #4a7cff;
  --accent2:   #7b5ea7;
  --cyan:      #38c8d8;
  --gold:      #f5c842;
  --rose:      #ff6090;
  --white:     #ffffff;
  --off-white: #f0f4ff;
  --muted:     #8896b3;
  --border:    rgba(74,124,255,0.18);
  --card-bg:   rgba(255,255,255,0.97);
  --glow:      rgba(74,124,255,0.35);
}

html, body { height: 100%; }

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  overflow: hidden;
  background: #06090f;
  position: relative;
}

/* ── RICH LAYERED BACKGROUND ── */
.bg-base {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 70% 60% at 75% 50%, rgba(18,32,90,.95) 0%, transparent 60%),
    radial-gradient(ellipse 50% 80% at 20% 80%, rgba(40,15,70,.7) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 80% 10%, rgba(10,25,70,.8) 0%, transparent 50%),
    linear-gradient(160deg, #06090f 0%, #080e20 40%, #060818 100%);
}

/* Nebula / aurora layers */
.nebula {
  position: fixed; pointer-events: none; z-index: 0;
  border-radius: 50%; filter: blur(80px); mix-blend-mode: screen;
}
.nb1 { width:700px;height:500px;background:rgba(35,70,200,.13);top:-100px;right:-150px;animation:nbPulse 12s ease-in-out infinite; }
.nb2 { width:500px;height:600px;background:rgba(100,40,160,.1);bottom:-200px;left:-100px;animation:nbPulse 15s ease-in-out infinite 3s; }
.nb3 { width:400px;height:300px;background:rgba(56,200,216,.07);top:30%;left:25%;animation:nbPulse 10s ease-in-out infinite 6s; }
.nb4 { width:350px;height:350px;background:rgba(245,200,66,.05);top:10%;left:60%;animation:nbPulse 18s ease-in-out infinite 2s; }
.nb5 { width:250px;height:250px;background:rgba(255,80,144,.06);bottom:20%;right:30%;animation:nbPulse 9s ease-in-out infinite 4s; }
@keyframes nbPulse { 0%,100%{opacity:.4;transform:scale(1) translate(0,0)} 33%{opacity:.9;transform:scale(1.15) translate(2%,-1%)} 66%{opacity:.6;transform:scale(.95) translate(-1%,2%)} }

/* Fine grain texture overlay */
.grain {
  position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: .025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
}

/* ── MAIN CARD ── */
.card {
  position: relative; z-index: 10;
  width: 100%; max-width: 1020px;
  min-height: 600px;
  display: grid;
  grid-template-columns: 50% 50%;
  border-radius: 28px;
  overflow: hidden;
  box-shadow:
    0 60px 140px rgba(0,0,0,.75),
    0 0 0 1px rgba(74,124,255,.18),
    0 0 80px rgba(45,76,173,.12),
    inset 0 1px 0 rgba(255,255,255,.07);
  animation: cardIn .7s cubic-bezier(.34,1.4,.64,1) both;
}
@keyframes cardIn {
  from { opacity:0; transform:scale(.9) translateY(30px); }
  to   { opacity:1; transform:scale(1)  translateY(0); }
}

/* ══ LEFT — FORM PANEL ══ */
.form-panel {
  background: var(--card-bg);
  padding: 50px 46px;
  display: flex; flex-direction: column; justify-content: center;
  position: relative; z-index: 2;
}
.form-panel::before {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 80% 60% at 20% 0%, rgba(74,124,255,.05) 0%, transparent 60%);
}

.brand { display: flex; align-items: center; gap: 10px; margin-bottom: 34px; }
.brand-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(74,124,255,.4);
}
.brand-icon svg { width: 18px; height: 18px; }
.brand-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: #1a1f36; }
.brand-name span { color: var(--accent); }

.form-title { font-family: 'Nunito', sans-serif; font-size: 1.7rem; font-weight: 800; color: #0d1120; letter-spacing: -.03em; margin-bottom: 6px; }
.form-sub { font-size: .83rem; color: #8896b3; font-weight: 500; margin-bottom: 26px; line-height: 1.5; }

.name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.fg { margin-bottom: 14px; }
.fg:last-of-type { margin-bottom: 0; }

label { display: block; font-size: .72rem; font-weight: 700; color: #5a6580; margin-bottom: 5px; letter-spacing: .06em; text-transform: uppercase; }

input[type=text], input[type=email], input[type=password] {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid #e4e8f2;
  border-radius: 10px;
  font-family: 'Nunito', sans-serif; font-size: .87rem; color: #0d1120;
  background: #f8faff; outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px rgba(74,124,255,.12); }
input::placeholder { color: #b8c0d4; font-weight: 400; }

.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 42px; }
.pw-eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: .9rem; color: #b8c0d4; padding: 0; transition: color .2s; }
.pw-eye:hover { color: var(--accent); }

.terms-row { display: flex; align-items: flex-start; gap: 8px; margin: 14px 0 16px; font-size: .74rem; color: #8896b3; line-height: 1.5; }
.terms-row input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; margin-top: 2px; }
.terms-row label { text-transform: none; letter-spacing: 0; font-weight: 500; color: #8896b3; font-size: .74rem; margin-bottom: 0; }
.terms-row a { color: var(--accent); font-weight: 700; text-decoration: none; }
.terms-row a:hover { text-decoration: underline; }

.btn-main {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, var(--accent) 0%, #3a5fd8 100%);
  color: white; border: none; border-radius: 11px;
  font-family: 'Nunito', sans-serif; font-size: .92rem; font-weight: 800; letter-spacing: .04em;
  cursor: pointer; text-transform: uppercase;
  box-shadow: 0 6px 22px rgba(74,124,255,.45);
  transition: opacity .2s, transform .15s, box-shadow .2s;
  margin-bottom: 14px;
}
.btn-main:hover { opacity:.92; transform:translateY(-1px); box-shadow:0 10px 30px rgba(74,124,255,.5); }
.btn-main:active { transform:translateY(0); }

.divider { display: flex; align-items: center; gap: 10px; margin-bottom: 13px; color: #c0c8d8; font-size: .71rem; font-weight: 600; }
.divider::before, .divider::after { content:''; flex:1; height:1px; background:#e4e8f2; }

.btn-google {
  width: 100%; padding: 11px; background: #fff; color: #4a5568;
  border: 1.5px solid #e4e8f2; border-radius: 11px;
  font-family: 'Nunito', sans-serif; font-size: .85rem; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: border-color .2s, box-shadow .2s; margin-bottom: 20px;
}
.btn-google:hover { border-color: var(--accent); box-shadow: 0 2px 10px rgba(74,124,255,.1); }

.signin-row { text-align: center; font-size: .78rem; color: #8896b3; font-weight: 500; }
.signin-row a { color: var(--accent); font-weight: 700; text-decoration: none; }
.signin-row a:hover { text-decoration: underline; }

/* ══ RIGHT — WORLD PANEL ══ */
.world-panel {
  position: relative; overflow: hidden;
  background: transparent;
}

/* Rich layered world bg */
.world-panel::before {
  content: '';
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 100% 120% at 55% 50%, rgba(20,38,110,.98) 0%, rgba(12,22,65,.95) 40%, rgba(6,10,25,1) 75%),
    linear-gradient(180deg, #08102a 0%, #050910 100%);
}

/* Large ethereal orb */
.orb-ring {
  position: absolute;
  width: 120%; padding-bottom: 120%;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-52%, -50%);
  background: radial-gradient(ellipse at 40% 35%,
    rgba(74,124,255,.28) 0%,
    rgba(45,76,173,.2) 28%,
    rgba(15,25,60,.35) 55%,
    transparent 68%
  );
  pointer-events: none; z-index: 1;
  animation: orbBreath 8s ease-in-out infinite;
}
@keyframes orbBreath { 0%,100%{transform:translate(-52%,-50%) scale(1)} 50%{transform:translate(-52%,-50%) scale(1.05)} }
.orb-ring::before {
  content: '';
  position: absolute; inset: 7%;
  border-radius: 50%;
  border: 1px solid rgba(74,124,255,.18);
  box-shadow:
    inset 0 0 60px rgba(74,124,255,.1),
    0 0 40px rgba(74,124,255,.08);
}
.orb-ring::after {
  content: '';
  position: absolute; inset: 22%;
  border-radius: 50%;
  border: 1px solid rgba(74,124,255,.1);
  box-shadow: inset 0 0 30px rgba(56,200,216,.06);
}

/* inner glow spot */
.orb-inner {
  position: absolute; width: 40%; padding-bottom: 40%;
  border-radius: 50%;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: radial-gradient(ellipse at center,
    rgba(74,124,255,.18) 0%, rgba(45,76,173,.1) 40%, transparent 70%
  );
  z-index: 1; pointer-events: none;
  animation: orbBreath 6s ease-in-out infinite 2s;
}

/* Starfield — many more stars */
.star {
  position: absolute; border-radius: 50%;
  background: white; pointer-events: none; z-index: 2;
  animation: twinkle var(--td,3s) ease-in-out infinite var(--dl,0s);
}
@keyframes twinkle { 0%,100%{opacity:.15;transform:scale(.7)} 50%{opacity:1;transform:scale(1.3)} }

/* Shooting star */
.shoot {
  position: absolute; pointer-events: none; z-index: 2;
  width: 60px; height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,.0), rgba(255,255,255,.9), rgba(255,255,255,.0));
  border-radius: 1px;
  animation: shoot var(--sd,8s) ease-in-out infinite var(--sdl,0s);
  opacity: 0;
}
@keyframes shoot {
  0%   { opacity:0; transform:translateX(0) translateY(0) rotate(-25deg); }
  2%   { opacity:1; }
  8%   { opacity:0; transform:translateX(120px) translateY(60px) rotate(-25deg); }
  100% { opacity:0; transform:translateX(120px) translateY(60px) rotate(-25deg); }
}

/* world text */
.world-title {
  position: absolute; top: 9%; left: 50%;
  transform: translateX(-50%);
  z-index: 8; text-align: center;
  pointer-events: none;
}
.world-title h2 {
  font-family: 'Playfair Display', serif;
  font-style: italic; font-size: 1.2rem; font-weight: 600;
  color: rgba(255,255,255,.9);
  text-shadow: 0 0 30px rgba(74,124,255,.7), 0 0 60px rgba(74,124,255,.3);
  white-space: nowrap;
}
.world-title p {
  font-size: .62rem; font-weight: 700; letter-spacing: .14em;
  color: rgba(120,160,255,.65); text-transform: uppercase; margin-top: 5px;
}

/* ── FLOATING OBJECTS ── */
#floatLayer {
  position: absolute; inset: 0; z-index: 5;
  pointer-events: none;
}

.fobj {
  position: absolute;
  pointer-events: none;
  will-change: transform;
}
.fobj svg {
  filter: drop-shadow(0 6px 18px rgba(0,0,0,.6));
}

/* glow halos */
.fobj::after {
  content: '';
  position: absolute; inset: -10px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--halo, rgba(74,124,255,.15)) 0%, transparent 70%);
  pointer-events: none;
  animation: haloP var(--dur,6s) ease-in-out infinite var(--delay,0s);
}
@keyframes haloP {
  0%,100% { opacity:.5; transform:scale(1); }
  50%     { opacity:1;  transform:scale(1.2); }
}

/* Connection lines */
.conn-line {
  position: absolute; pointer-events: none; z-index: 4; opacity: .15;
}

/* dust particles */
.dust {
  position: absolute; border-radius: 50%;
  pointer-events: none; z-index: 3;
  animation: dustFloat var(--dd,20s) ease-in-out infinite var(--ddl,0s);
}
@keyframes dustFloat {
  0%   { transform:translate(0,0) scale(1); opacity:.4; }
  25%  { transform:translate(var(--dx1,8px), var(--dy1,-12px)) scale(1.2); opacity:.7; }
  50%  { transform:translate(var(--dx2,-6px), var(--dy2,-20px)) scale(.9); opacity:.5; }
  75%  { transform:translate(var(--dx3,12px), var(--dy3,-8px)) scale(1.1); opacity:.6; }
  100% { transform:translate(0,0) scale(1); opacity:.4; }
}

/* toast */
#toast {
  position: fixed; bottom: 22px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #1a2a5e; color: white;
  border: 1px solid rgba(74,124,255,.3);
  font-family: 'Nunito', sans-serif; font-size: .82rem; font-weight: 600;
  padding: 10px 24px; border-radius: 40px;
  z-index: 200; pointer-events: none; opacity: 0;
  transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

@media(max-width:700px) {
  .card { grid-template-columns: 1fr; }
  .world-panel { min-height: 280px; }
  .form-panel { padding: 30px 24px; }
  .name-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Rich background layers -->
<div class="bg-base"></div>
<div class="nebula nb1"></div>
<div class="nebula nb2"></div>
<div class="nebula nb3"></div>
<div class="nebula nb4"></div>
<div class="nebula nb5"></div>
<div class="grain"></div>

<div class="card">

  <!-- ══ LEFT: FORM ══ -->
  <div class="form-panel">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
          <path d="M2 6s1.5-2 5-2 5 2 5 2v14s-1.5-1-5-1-5 1-5 1V6z"/>
          <path d="M12 6s1.5-2 5-2 5 2 5 2v14s-1.5-1-5-1-5 1-5 1V6z"/>
        </svg>
      </div>
      <div class="brand-name">House of <span>Verses</span></div>
    </div>

    <h1 class="form-title">Create your account</h1>
    <p class="form-sub">Join the literary sanctuary — where every verse finds its reader.</p>

    <div class="name-row">
      <div class="fg" style="margin-bottom:0">
        <label>First Name</label>
        <input type="text" id="fn" placeholder="Ada" autocomplete="given-name">
      </div>
      <div class="fg" style="margin-bottom:0">
        <label>Last Name</label>
        <input type="text" id="ln" placeholder="Lovelace" autocomplete="family-name">
      </div>
    </div>
    <div style="height:14px"></div>
    <div class="fg">
      <label>Email Address</label>
      <input type="email" id="em" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="fg">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="pw" placeholder="Min. 8 characters" autocomplete="new-password">
        <button class="pw-eye" id="pwBtn" onclick="togglePw()" type="button">👁️</button>
      </div>
    </div>
    <div class="terms-row">
      <input type="checkbox" id="terms">
      <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
    </div>

    <button class="btn-main" onclick="doSignUp()">Create Account</button>
    <div class="divider">or continue with</div>
    <button class="btn-google">
      <svg width="16" height="16" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google
    </button>
    <div class="signin-row">Already have an account? <a href="#">Sign in</a></div>
  </div>

  <!-- ══ RIGHT: WORLD PANEL ══ -->
  <div class="world-panel" id="worldPanel">
    <div class="orb-ring"></div>
    <div class="orb-inner"></div>

    <!-- Starfield — many more stars for richness -->
    <div class="star" style="--td:2.8s;--dl:.3s;width:1.5px;height:1.5px;top:5%;left:10%"></div>
    <div class="star" style="--td:3.5s;--dl:1s;width:2px;height:2px;top:8%;left:25%"></div>
    <div class="star" style="--td:2.2s;--dl:1.8s;width:1px;height:1px;top:12%;left:42%"></div>
    <div class="star" style="--td:4s;--dl:.6s;width:3px;height:3px;top:6%;left:62%"></div>
    <div class="star" style="--td:2.6s;--dl:2.2s;width:1.5px;height:1.5px;top:15%;left:78%"></div>
    <div class="star" style="--td:3.1s;--dl:0s;width:2px;height:2px;top:22%;left:88%"></div>
    <div class="star" style="--td:2.9s;--dl:1.4s;width:1px;height:1px;top:30%;left:5%"></div>
    <div class="star" style="--td:3.8s;--dl:.9s;width:2.5px;height:2.5px;top:38%;left:92%"></div>
    <div class="star" style="--td:2.4s;--dl:2.6s;width:1.5px;height:1.5px;top:55%;left:82%"></div>
    <div class="star" style="--td:3.3s;--dl:.4s;width:1px;height:1px;top:62%;left:14%"></div>
    <div class="star" style="--td:2.7s;--dl:1.7s;width:2px;height:2px;top:70%;left:35%"></div>
    <div class="star" style="--td:3.6s;--dl:3s;width:1.5px;height:1.5px;top:78%;left:72%"></div>
    <div class="star" style="--td:2s;--dl:.7s;width:1px;height:1px;top:85%;left:55%"></div>
    <div class="star" style="--td:4.2s;--dl:1.1s;width:2px;height:2px;top:90%;left:20%"></div>
    <div class="star" style="--td:2.5s;--dl:2.9s;width:1px;height:1px;top:94%;left:85%"></div>
    <div class="star" style="--td:3s;--dl:.2s;width:1.5px;height:1.5px;top:48%;left:50%"></div>
    <div class="star" style="--td:3.9s;--dl:1.5s;width:1px;height:1px;top:3%;left:48%"></div>
    <div class="star" style="--td:2.3s;--dl:3.2s;width:2px;height:2px;top:20%;left:18%"></div>
    <div class="star" style="--td:3.4s;--dl:.8s;width:1px;height:1px;top:44%;left:70%"></div>
    <div class="star" style="--td:2.1s;--dl:2s;width:1.5px;height:1.5px;top:67%;left:96%"></div>

    <!-- Shooting stars -->
    <div class="shoot" style="--sd:11s;--sdl:2s;top:18%;left:20%"></div>
    <div class="shoot" style="--sd:14s;--sdl:7s;top:35%;left:50%"></div>
    <div class="shoot" style="--sd:9s;--sdl:4s;top:8%;left:55%"></div>

    <!-- Dust particles -->

          <!-- right lens -->
          <circle cx="50" cy="14" r="10" fill="none" stroke="#4a7cff" stroke-width="2" opacity=".8"/>
          <circle cx="50" cy="14" r="8.5" fill="url(#glassR)"/>
          <ellipse cx="46" cy="10" rx="3.5" ry="2.5" fill="rgba(255,255,255,.15)" transform="rotate(-20 46 10)"/>
          <!-- right arm -->
          <line x1="60" y1="14" x2="70" y2="14" stroke="#4a7cff" stroke-width="2" stroke-linecap="round" opacity=".75"/>

      <div class="fobj" id="obj14"

        <svg width="44" height="58" viewBox="0 0 44 58" fill="none">

          <path d="M22 38 Q18 46 20 58" stroke="rgba(60,120,60,.7)" stroke-width="2" fill="none"/>

        <svg width="32" height="60" viewBox="0 0 32 60" fill="none">
          <defs>
            <linearGradient id="f2G" x1="0" y1="0" x2="1" y2="1">

          <path d="M16 22 C11 24 7 27 4 30" stroke="rgba(220,200,255,.25)" stroke-width=".6" fill="none"/>
          <path d="M16 14 C21 16 25 18 28 21" stroke="rgba(220,200,255,.3)" stroke-width=".6" fill="none"/>
          <path d="M16 22 C21 24 25 27 28 30" stroke="rgba(220,200,255,.25)" stroke-width=".6" fill="none"/>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  OBJECT BEHAVIOR SYSTEM
//  modes: parallax | drift | orbit | breathe | magnetic
// ═══════════════════════════════════════════════════════
const panel = document.getElementById('worldPanel');

const OBJECTS = [
  { id:'obj0',  mode:'breathe',   bobAmp:5,  bobSpeed:.0007, rotRange:2,  lerpSpeed:.04,  parallaxStrength:0,
    desc:'center open book — breathes' },
  { id:'obj1',  mode:'parallax',  bobAmp:18, bobSpeed:.0014, rotRange:14, lerpSpeed:.09,  parallaxStrength:40,
    desc:'large quill — eager cursor' },
  { id:'obj2',  mode:'drift',     bobAmp:10, bobSpeed:.0009, rotRange:8,  lerpSpeed:.03,  parallaxStrength:0,
    driftRadX:20, driftRadY:14, driftSpeed:.00033,
    desc:'closed book — autonomous drift' },
  { id:'obj3',  mode:'parallax',  bobAmp:8,  bobSpeed:.0011, rotRange:7,  lerpSpeed:.035, parallaxStrength:22,
    desc:'scroll — lazy cursor' },
  { id:'obj4',  mode:'orbit',     bobAmp:6,  bobSpeed:.0013, rotRange:5,  lerpSpeed:.05,  parallaxStrength:0,
    orbitCX:0, orbitCY:10, orbitRX:16, orbitRY:10, orbitSpeed:.00042,
    desc:'ink bottle — orbits' },
  { id:'obj5',  mode:'parallax',  bobAmp:7,  bobSpeed:.0007, rotRange:4,  lerpSpeed:.06,  parallaxStrength:-30,
    desc:'book stack — counter-parallax' },
  { id:'obj6',  mode:'drift',     bobAmp:22, bobSpeed:.0006, rotRange:3,  lerpSpeed:.02,  parallaxStrength:0,
    driftRadX:12, driftRadY:22, driftSpeed:.00026,
    desc:'Aa typography — dreamy drift' },
  { id:'obj7',  mode:'magnetic',  bobAmp:12, bobSpeed:.0018, rotRange:18, lerpSpeed:.11,  parallaxStrength:16,
    magnetDist:190, magnetStrength:35,
    desc:'bookmark — magnetic' },
  { id:'obj8',  mode:'drift',     bobAmp:14, bobSpeed:.001,  rotRange:10, lerpSpeed:.025, parallaxStrength:0,
    driftRadX:16, driftRadY:10, driftSpeed:.0004,
    desc:'hourglass — drifts' },
  { id:'obj9',  mode:'parallax',  bobAmp:9,  bobSpeed:.0012, rotRange:6,  lerpSpeed:.045, parallaxStrength:18,
    desc:'candle — follows cursor gently' },
  { id:'obj10', mode:'drift',     bobAmp:11, bobSpeed:.0008, rotRange:9,  lerpSpeed:.02,  parallaxStrength:0,
    driftRadX:14, driftRadY:18, driftSpeed:.00038,
    desc:'open notebook — drifts' },
  { id:'obj11', mode:'parallax',  bobAmp:10, bobSpeed:.0015, rotRange:12, lerpSpeed:.07,  parallaxStrength:28,
    desc:'magnifying glass — cursor follow' },
  { id:'obj12', mode:'orbit',     bobAmp:5,  bobSpeed:.001,  rotRange:4,  lerpSpeed:.04,  parallaxStrength:0,
    orbitCX:5, orbitCY:5, orbitRX:12, orbitRY:8, orbitSpeed:.00038,
    desc:'laurel wreath — orbits' },
  { id:'obj13', mode:'drift',     bobAmp:8,  bobSpeed:.0009, rotRange:6,  lerpSpeed:.022, parallaxStrength:0,
    driftRadX:18, driftRadY:8,  driftSpeed:.00044,
    desc:'spectacles — drifts' },
  { id:'obj14', mode:'parallax',  bobAmp:15, bobSpeed:.0013, rotRange:16, lerpSpeed:.08,  parallaxStrength:-24,
    desc:'rose — counter-parallax' },
  { id:'obj15', mode:'orbit',     bobAmp:7,  bobSpeed:.0016, rotRange:7,  lerpSpeed:.05,  parallaxStrength:0,
    orbitCX:-8, orbitCY:0, orbitRX:20, orbitRY:12, orbitSpeed:.0005,
    desc:'inkwell splatter — orbits' },
  { id:'obj16', mode:'drift',     bobAmp:16, bobSpeed:.0007, rotRange:12, lerpSpeed:.018, parallaxStrength:0,
    driftRadX:10, driftRadY:24, driftSpeed:.00029,
    desc:'small feather — dreamy drift' },
];

const objs = OBJECTS.map(o => ({
  ...o,
  el: document.getElementById(o.id),
  cx: 0, cy: 0,
  bobT: Math.random() * Math.PI * 2,
  driftT: Math.random() * Math.PI * 2,
  orbitT: Math.random() * Math.PI * 2,
}));

// Connection pairs — more connections for a richer web
const CONN_PAIRS = [[0,1],[0,3],[0,7],[1,11],[2,8],[4,9],[5,12],[6,14]];
const connLines  = ['cl1','cl2','cl3','cl4','cl5','cl6','cl7'].map(id => document.getElementById(id));

let rawMouseX = 0, rawMouseY = 0;
let smMouseX  = 0, smMouseY  = 0;
let absMouseX = 0, absMouseY = 0;
let panelRect = panel.getBoundingClientRect();

function refreshRect() { panelRect = panel.getBoundingClientRect(); }
window.addEventListener('resize', refreshRect);
setTimeout(refreshRect, 300);
setTimeout(refreshRect, 900);

document.addEventListener('mousemove', e => {
  absMouseX = e.clientX; absMouseY = e.clientY;
  refreshRect();
  rawMouseX = Math.max(-1, Math.min(1, (e.clientX - panelRect.left - panelRect.width/2)  / (panelRect.width/2)));
  rawMouseY = Math.max(-1, Math.min(1, (e.clientY - panelRect.top  - panelRect.height/2) / (panelRect.height/2)));
});

function updateLines() {
  CONN_PAIRS.forEach(([ai, bi], i) => {
    const a = objs[ai]?.el, b = objs[bi]?.el, ln = connLines[i];
    if (!a || !b || !ln) return;
    const ar = a.getBoundingClientRect(), br = b.getBoundingClientRect(), pr = panelRect;
    ln.setAttribute('x1', (ar.left + ar.width /2 - pr.left).toFixed(1));
    ln.setAttribute('y1', (ar.top  + ar.height/2 - pr.top ).toFixed(1));
    ln.setAttribute('x2', (br.left + br.width /2 - pr.left).toFixed(1));
    ln.setAttribute('y2', (br.top  + br.height/2 - pr.top ).toFixed(1));
  });
}

let lastT = null;
requestAnimationFrame(function loop(ts) {
  if (!lastT) lastT = ts;
  const dt = Math.min(ts - lastT, 50);
  lastT = ts;

  smMouseX += (rawMouseX - smMouseX) * 0.06;
  smMouseY += (rawMouseY - smMouseY) * 0.06;

  objs.forEach(obj => {
    if (!obj.el) return;
    obj.bobT   += dt;
    obj.driftT += dt;
    obj.orbitT += dt;

    let tx = 0, ty = 0, extraRot = 0, extraScale = 1;
    const bob = Math.sin(obj.bobT * obj.bobSpeed) * obj.bobAmp;

    switch (obj.mode) {
      case 'parallax':
        tx = smMouseX * obj.parallaxStrength;
        ty = smMouseY * obj.parallaxStrength * 0.7;
        obj.cx += (tx - obj.cx) * obj.lerpSpeed;
        obj.cy += (ty - obj.cy) * obj.lerpSpeed;
        extraRot = smMouseX * obj.rotRange;
        break;

      case 'drift':
        tx = Math.sin(obj.driftT * obj.driftSpeed) * obj.driftRadX;
        ty = Math.sin(obj.driftT * obj.driftSpeed * 2) * obj.driftRadY;
        obj.cx += (tx - obj.cx) * 0.016;
        obj.cy += (ty - obj.cy) * 0.016;
        extraRot = Math.sin(obj.driftT * obj.driftSpeed * 1.3) * obj.rotRange;
        break;

      case 'orbit':
        tx = Math.cos(obj.orbitT * obj.orbitSpeed) * obj.orbitRX + obj.orbitCX;
        ty = Math.sin(obj.orbitT * obj.orbitSpeed) * obj.orbitRY + obj.orbitCY;
        obj.cx += (tx - obj.cx) * 0.04;
        obj.cy += (ty - obj.cy) * 0.04;
        extraRot = Math.sin(obj.orbitT * obj.orbitSpeed) * obj.rotRange;
        break;

      case 'breathe':
        extraScale = 1 + Math.sin(obj.bobT * 0.0006) * 0.04;
        extraRot   = Math.sin(obj.bobT * 0.0004) * obj.rotRange;
        obj.cx += (0 - obj.cx) * 0.02;
        obj.cy += (0 - obj.cy) * 0.02;
        break;

      case 'magnetic': {
        const er = obj.el.getBoundingClientRect();
        const ecx = er.left + er.width/2, ecy = er.top + er.height/2;
        const dx = absMouseX - ecx, dy = absMouseY - ecy;
        const dist = Math.hypot(dx, dy) || 1;
        if (dist < obj.magnetDist) {
          const pull = (1 - dist / obj.magnetDist) * obj.magnetStrength;
          tx = (dx / dist) * pull;
          ty = (dy / dist) * pull;
        } else {
          tx = smMouseX * obj.parallaxStrength * 0.5;
          ty = smMouseY * obj.parallaxStrength * 0.5;
        }
        obj.cx += (tx - obj.cx) * obj.lerpSpeed;
        obj.cy += (ty - obj.cy) * obj.lerpSpeed;
        extraRot = smMouseX * obj.rotRange;
        break;
      }
    }

    obj.el.style.transform =
      `translate(${obj.cx.toFixed(1)}px, ${(obj.cy + bob).toFixed(1)}px)` +
      ` rotate(${extraRot.toFixed(2)}deg)` +
      ` scale(${extraScale.toFixed(3)})`;
  });

  updateLines();
  requestAnimationFrame(loop);
});

// ── FORM ──
function togglePw() {
  const i = document.getElementById('pw'), b = document.getElementById('pwBtn');
  i.type = i.type === 'password' ? 'text' : 'password';
  b.textContent = i.type === 'password' ? '👁️' : '🙈';
}
function doSignUp() {
  const fn = document.getElementById('fn').value.trim();
  const ln = document.getElementById('ln').value.trim();
  const em = document.getElementById('em').value.trim();
  const pw = document.getElementById('pw').value;
  const ok = document.getElementById('terms').checked;
  if (!fn||!ln||!em||!pw) return toast('⚠️ Please fill in all fields.');
  if (pw.length < 8)       return toast('🔑 Password needs 8+ characters.');
  if (!ok)                 return toast('📜 Please agree to the Terms first.');
  toast(`✨ Welcome, ${fn}! Your library awaits.`);
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}
</script>
