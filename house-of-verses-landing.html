<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House of Verses · Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --lav:      #b8a9d9;
  --lav-deep: #7c6aad;
  --lav-pale: #f0edf9;
  --pb-deep:  #4a6faf;
  --white:    #ffffff;
  --soft:     #fafafe;
  --dark:     #2d2145;
  --mid:      #6b5f8a;
  --faint:    #a498c0;
  --border:   #e2daf2;
}

html, body { height: 100%; }
body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 16px; overflow: hidden;
  background: linear-gradient(135deg, #ece7fa 0%, #dce8f8 50%, #e6e0f6 100%);
  position: relative;
}

/* bg blobs */
.blob { position:fixed; border-radius:50%; filter:blur(72px); pointer-events:none; z-index:0; animation:blobM 10s ease-in-out infinite; }
.b1{width:440px;height:440px;background:rgba(184,169,217,.3);  top:-130px;left:-110px;}
.b2{width:340px;height:340px;background:rgba(143,168,216,.28); bottom:-100px;right:-90px;animation-delay:4s;}
.b3{width:240px;height:240px;background:rgba(200,190,230,.2);  top:42%;left:36%;animation-delay:7s;}
@keyframes blobM{0%,100%{transform:translate(0,0)scale(1)}50%{transform:translate(18px,-18px)scale(1.06)}}

.sp{position:fixed;pointer-events:none;z-index:0;opacity:0;animation:spA 5s ease-in-out infinite;font-size:.9rem}
.s1{top:9%;left:6%}.s2{top:21%;left:17%;animation-delay:1.4s;font-size:.7rem}
.s3{top:6%;right:12%;animation-delay:2.2s;font-size:1rem}.s4{top:54%;left:4%;animation-delay:.8s;font-size:.75rem}
.s5{bottom:17%;right:6%;animation-delay:3.3s}.s6{bottom:7%;left:27%;animation-delay:1.9s;font-size:.7rem}
@keyframes spA{0%,100%{opacity:0;transform:scale(.4)rotate(0)}45%,55%{opacity:.65;transform:scale(1)rotate(25deg)}}

/* ── CARD ── */
.card {
  position:relative; z-index:10;
  width:100%; max-width:960px;
  background:var(--white); border-radius:32px;
  display:grid; grid-template-columns:48% 52%;
  box-shadow:0 40px 100px rgba(80,60,140,.22),0 8px 30px rgba(80,60,140,.12);
  overflow:hidden;
  animation:cardPop .7s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes cardPop{from{opacity:0;transform:scale(.88)translateY(28px)}to{opacity:1;transform:scale(1)translateY(0)}}

/* ══ LEFT PANEL ══ */
.left {
  position:relative; overflow:hidden;
  border-radius:26px; margin:8px;
  min-height:600px;
  background:linear-gradient(175deg,#bcd8f2 0%,#a2c8ec 22%,#8ab8e4 52%,#78aede 100%);
  display:flex; align-items:flex-end;
}

/* sky light */
.left::before {
  content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 95% 52% at 50% -8%,rgba(255,255,255,.58) 0%,transparent 55%),
    radial-gradient(ellipse 45% 32% at 12% 28%,rgba(255,255,255,.22) 0%,transparent 50%),
    radial-gradient(ellipse 38% 28% at 88% 18%,rgba(255,255,255,.2)  0%,transparent 50%);
}
/* dot grid */
.left::after {
  content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(255,255,255,.11) 1px,transparent 1px);
  background-size:26px 26px;
}

/* ground */
.ground{
  position:absolute;bottom:0;left:0;right:0;z-index:1;
  height:115px;
  background:linear-gradient(180deg,#6aba5e 0%,#4a9a44 40%,#357a30 100%);
}
.ground::before{
  content:'';position:absolute;top:-24px;left:0;right:0;height:48px;
  background:#78c470;border-radius:50% 50% 0 0/24px 24px 0 0;
}

/* mini clouds */
.mc{position:absolute;z-index:2;background:rgba(255,255,255,.72);border-radius:40px;pointer-events:none;}
.mc::before,.mc::after{content:'';position:absolute;background:rgba(255,255,255,.72);border-radius:50%;}
.mc1{width:92px;height:27px;top:7%;left:5%;animation:mcD 22s linear infinite}
.mc1::before{width:38px;height:38px;top:-19px;left:7px}.mc1::after{width:29px;height:29px;top:-14px;left:37px}
.mc2{width:115px;height:32px;top:4%;right:6%;animation:mcD 30s linear 10s infinite;opacity:.6}
.mc2::before{width:46px;height:46px;top:-23px;left:9px}.mc2::after{width:34px;height:34px;top:-16px;left:46px}
.mc3{width:72px;height:22px;top:18%;left:12%;animation:mcD 19s linear 5s infinite;opacity:.5}
.mc3::before{width:30px;height:30px;top:-15px;left:6px}.mc3::after{width:23px;height:23px;top:-11px;left:28px}
@keyframes mcD{0%{transform:translateX(0)}50%{transform:translateX(28px)}100%{transform:translateX(0)}}

/* floating deco */
.bd{position:absolute;z-index:2;pointer-events:none;opacity:.2;font-size:1.2rem;animation:bdF 7s ease-in-out infinite}
.bd1{top:5%;right:12%;animation-delay:0s}
.bd2{top:21%;left:5%;animation-delay:2.5s;font-size:1rem}
.bd3{top:12%;right:26%;animation-delay:4s;font-size:.9rem}
@keyframes bdF{0%,100%{transform:translateY(0)rotate(-6deg);opacity:.2}50%{transform:translateY(-13px)rotate(6deg);opacity:.36}}

/* ── KAPIBOO SCENE ── */
/* Outer wrapper: controls body bob + lean + rotate */
#kapiScene {
  position:absolute;
  bottom:88px;   /* sits on grass */
  left:50%;
  width:96%;     /* FILL the panel — like Yeti in reference */
  max-width:380px;
  transform:translateX(-50%);
  transform-origin:center bottom;
  z-index:4;
  will-change:transform;
}

/* Kapiboo image — base layer */
#kapiImg {
  width:100%; height:auto; display:block;
  filter:drop-shadow(0 22px 36px rgba(40,20,90,.3));
  user-select:none; -webkit-user-drag:none;
  transition:filter .5s ease;
  position:relative; z-index:1;
}

/* Canvas eye overlay — drawn on top of the image */
#eyeCanvas {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  z-index:2;
  pointer-events:none;
}

/* expression filter classes */
.e-happy    { filter:drop-shadow(0 22px 36px rgba(40,20,90,.3))  brightness(1.05) saturate(1.08) !important; }
.e-wave     { filter:drop-shadow(0 22px 36px rgba(80,50,160,.32)) brightness(1.1)  saturate(1.2)  hue-rotate(5deg) !important; }
.e-surprise { filter:drop-shadow(0 22px 36px rgba(210,100,50,.3)) brightness(1.15) saturate(1.28) contrast(1.06) !important; }
.e-grumpy   { filter:drop-shadow(0 22px 36px rgba(40,20,90,.3))  brightness(.87)  saturate(.72)  hue-rotate(-10deg) !important; }
.e-sleepy   { filter:drop-shadow(0 22px 36px rgba(40,20,90,.24)) brightness(.76)  saturate(.52)  !important; }

/* speech bubble */
#bubble {
  position:absolute;
  top:-4%; left:50%;
  transform:translateX(-50%) scale(.5) translateY(14px);
  background:white; border-radius:22px; padding:8px 17px;
  font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700;
  color:var(--dark); white-space:nowrap;
  box-shadow:0 6px 22px rgba(100,80,160,.18);
  opacity:0; pointer-events:none; z-index:6;
  transition:opacity .3s, transform .38s cubic-bezier(.34,1.56,.64,1);
}
#bubble::after{
  content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:white;
}
#bubble.show{opacity:1;transform:translateX(-50%) scale(1) translateY(0);}

/* tagline */
.tagline{
  position:absolute;bottom:0;left:0;right:0;z-index:5;
  padding:18px 22px 22px;
  background:linear-gradient(to top,rgba(70,45,130,.52) 0%,transparent 100%);
}
.tl-main{
  display:block;font-family:'Playfair Display',serif;font-style:italic;
  font-weight:700;font-size:1.42rem;color:white;line-height:1.25;
  text-shadow:0 2px 10px rgba(40,20,90,.4);margin-bottom:4px;
}
.tl-sub{
  display:block;font-family:'Nunito',sans-serif;font-size:.73rem;
  font-weight:700;color:rgba(255,255,255,.76);letter-spacing:.07em;text-transform:uppercase;
}

/* ══ RIGHT PANEL ══ */
.right{
  padding:44px 42px 36px;
  display:flex;flex-direction:column;justify-content:center;
  background:var(--soft);
}

.brand{display:flex;align-items:center;gap:10px;margin-bottom:26px;}
.brand-mark{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--lav) 0%,#8fa8d8 100%);
  border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:0 4px 12px rgba(124,106,173,.28);
}
.brand-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--dark);}
.brand-name span{color:var(--lav-deep);}

.form-title{font-family:'Nunito',sans-serif;font-size:1.65rem;font-weight:900;color:var(--dark);letter-spacing:-.02em;margin-bottom:5px;}
.form-sub{font-size:.83rem;color:var(--faint);font-weight:500;margin-bottom:22px;line-height:1.5;}

.name-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fg{margin-bottom:12px;}

label{
  display:block;font-size:.74rem;font-weight:700;color:var(--mid);
  margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase;
}

input[type=text],input[type=email],input[type=password]{
  width:100%;padding:11px 14px;
  border:1.5px solid var(--border);border-radius:11px;
  font-family:'Nunito',sans-serif;font-size:.86rem;color:var(--dark);
  background:var(--white);outline:none;
  transition:border-color .2s,box-shadow .2s;
}
input:focus{border-color:var(--lav);box-shadow:0 0 0 3px rgba(184,169,217,.22);}
input::placeholder{color:var(--faint);font-weight:400;}

.pw-wrap{position:relative;}
.pw-wrap input{padding-right:42px;}
.pw-eye{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  font-size:.95rem;color:var(--faint);padding:0;transition:color .2s;
}
.pw-eye:hover{color:var(--lav-deep);}

.terms-row{
  display:flex;align-items:flex-start;gap:8px;
  margin:13px 0 15px;font-size:.75rem;color:var(--faint);line-height:1.5;
}
.terms-row input[type=checkbox]{width:14px;height:14px;accent-color:var(--lav-deep);cursor:pointer;flex-shrink:0;margin-top:2px;}
.terms-row label{text-transform:none;letter-spacing:0;font-weight:500;color:var(--faint);font-size:.75rem;margin-bottom:0;}
.terms-row a{color:var(--lav-deep);font-weight:700;text-decoration:none;}
.terms-row a:hover{text-decoration:underline;}

.btn-main{
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--lav-deep) 0%,var(--pb-deep) 100%);
  color:white;border:none;border-radius:13px;
  font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:800;letter-spacing:.02em;
  cursor:pointer;box-shadow:0 6px 20px rgba(124,106,173,.35);
  transition:opacity .2s,transform .15s,box-shadow .2s;margin-bottom:11px;
}
.btn-main:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 10px 28px rgba(124,106,173,.42);}
.btn-main:active{transform:translateY(0);}

.divider{display:flex;align-items:center;gap:10px;margin-bottom:11px;color:var(--faint);font-size:.72rem;font-weight:600;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.btn-google{
  width:100%;padding:11px;background:var(--white);color:var(--mid);
  border:1.5px solid var(--border);border-radius:13px;
  font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:border-color .2s,background .2s;margin-bottom:17px;
}
.btn-google:hover{border-color:var(--lav);background:var(--lav-pale);}

.signin-row{text-align:center;font-size:.77rem;color:var(--faint);font-weight:500;}
.signin-row a{color:var(--lav-deep);font-weight:700;text-decoration:none;}
.signin-row a:hover{text-decoration:underline;}

#toast{
  position:fixed;bottom:22px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--dark);color:white;
  font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:600;
  padding:9px 22px;border-radius:40px;
  z-index:200;pointer-events:none;opacity:0;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .3s;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

@media(max-width:680px){
  .card{grid-template-columns:1fr;}
  .left{min-height:280px;margin:8px 8px 0;}
  #kapiScene{width:74%;bottom:70px;}
  .right{padding:26px 20px;}
  .name-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
<div class="sp s1">✦</div><div class="sp s2">✧</div><div class="sp s3">✦</div>
<div class="sp s4">✧</div><div class="sp s5">✦</div><div class="sp s6">✧</div>

<div class="card">

  <!-- ══ LEFT ══ -->
  <div class="left" id="leftPanel">
    <div class="mc mc1"></div><div class="mc mc2"></div><div class="mc mc3"></div>
    <div class="bd bd1">📖</div><div class="bd bd2">✒️</div><div class="bd bd3">📜</div>
    <div class="ground"></div>

    <div id="bubble">📖 Come read with me!</div>

    <div id="kapiScene">
      <!-- Canvas draws animated eyes ON TOP of the PNG -->
      <canvas id="eyeCanvas"></canvas>
      <img id="kapiImg" src="kapiboo.png" alt="Kapiboo" draggable="false"
           onerror="this.outerHTML='<div style=\'font-size:11rem;text-align:center;line-height:1;padding:20px 0\'>🦫</div>'"
           onload="onImgLoad()">
    </div>

    <div class="tagline">
      <span class="tl-main">"Every story starts<br>with one page."</span>
      <span class="tl-sub">House of Verses · Your digital library</span>
    </div>
  </div>

  <!-- ══ RIGHT ══ -->
  <div class="right">
    <div class="brand">
      <div class="brand-mark">📖</div>
      <div class="brand-name">House of <span>Verses</span></div>
    </div>

    <h1 class="form-title">Create your account</h1>
    <p class="form-sub">Join Kapiboo's library — free forever, full of wonders.</p>

    <div class="name-row">
      <div class="fg" style="margin-bottom:0">
        <label>First Name</label>
        <input type="text" id="fn" placeholder="Ada" autocomplete="given-name">
      </div>
      <div class="fg" style="margin-bottom:0">
        <label>Last Name</label>
        <input type="text" id="ln" placeholder="Lovelace" autocomplete="family-name">
      </div>
    </div>
    <div style="height:12px"></div>
    <div class="fg">
      <label>Email Address</label>
      <input type="email" id="em" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="fg">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="pw" placeholder="Min. 8 characters" autocomplete="new-password">
        <button class="pw-eye" id="pwBtn" onclick="togglePw()" type="button">👁️</button>
      </div>
    </div>
    <div class="terms-row">
      <input type="checkbox" id="terms">
      <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
    </div>
    <button class="btn-main" onclick="doSignUp()">Create Account ✦</button>
    <div class="divider">or</div>
    <button class="btn-google">
      <svg width="17" height="17" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
    <div class="signin-row">Already have an account? <a href="#">Sign in</a></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
//  EYE TRACKING SYSTEM
//  Canvas sits over the PNG and draws pupils that follow
//  the user's cursor — positioned precisely on Kapiboo's eyes
// ═══════════════════════════════════════════════════════

const canvas = document.getElementById('eyeCanvas');
const ctx    = canvas.getContext('2d');
const img    = document.getElementById('kapiImg');
const scene  = document.getElementById('kapiScene');

// Eye positions as % of image dimensions (720×720 source)
// Left eye center ~(268, 258), Right eye center ~(410, 248) in 720px image
// As fractions: left=(0.372, 0.358), right=(0.570, 0.344)
const EYES = [
  { fx: 0.368, fy: 0.355 },  // left eye
  { fx: 0.568, fy: 0.340 },  // right eye
];

// Eye rendering params (will scale with rendered image size)
const EYE_R      = 0.038;  // eyeball radius as fraction of img width
const PUPIL_R    = 0.016;  // pupil radius fraction
const PUPIL_MOVE = 0.016;  // max pupil travel fraction
const IRIS_R     = 0.024;  // iris radius fraction

// Smooth cursor state
let cursorX = window.innerWidth  / 2;
let cursorY = window.innerHeight / 2;
let smoothX = cursorX, smoothY = cursorY;

// Current rendered image size (updated on resize/load)
let imgW = 0, imgH = 0, imgLeft = 0, imgTop = 0;

function updateImgBounds() {
  const r = img.getBoundingClientRect();
  imgW = r.width; imgH = r.height;
  imgLeft = r.left; imgTop = r.top;
  canvas.width  = imgW;
  canvas.height = imgH;
}

function onImgLoad() {
  updateImgBounds();
}

window.addEventListener('resize', updateImgBounds);

// ── Draw eyes each frame ──
function drawEyes(cx, cy) {
  if (!imgW || !imgH) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const eyeR   = imgW * EYE_R;
  const irisR  = imgW * IRIS_R;
  const pupilR = imgW * PUPIL_R;
  const maxMov = imgW * PUPIL_MOVE;

  EYES.forEach(eye => {
    const ex = eye.fx * imgW;  // eye center in canvas coords
    const ey = eye.fy * imgH;

    // Vector from eye to cursor (in screen space)
    const screenEyeX = imgLeft + ex;
    const screenEyeY = imgTop  + ey;
    const dx = cx - screenEyeX;
    const dy = cy - screenEyeY;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;

    // Clamp pupil movement within eyeball
    const travel = Math.min(dist * .18, maxMov);
    const px = ex + (dx / dist) * travel;
    const py = ey + (dy / dist) * travel;

    // ── White of eye (sclera) ──
    ctx.save();
    ctx.beginPath();
    // Kapiboo has small almond-shaped eyes — use ellipse
    ctx.ellipse(ex, ey, eyeR, eyeR * 0.72, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fill();
    ctx.restore();

    // ── Iris ──
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(px, py, irisR, irisR * 0.88, 0, 0, Math.PI * 2);
    // Brown iris matching Kapiboo's color
    const irisGrad = ctx.createRadialGradient(px, py, 0, px, py, irisR);
    irisGrad.addColorStop(0,   '#6b3a1f');
    irisGrad.addColorStop(0.6, '#4a2410');
    irisGrad.addColorStop(1,   '#2a1208');
    ctx.fillStyle = irisGrad;
    ctx.fill();
    ctx.restore();

    // ── Pupil ──
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(px, py, pupilR, pupilR * 0.88, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#0a0608';
    ctx.fill();
    ctx.restore();

    // ── Catchlight (highlight) ──
    ctx.save();
    ctx.beginPath();
    const hlX = px - pupilR * .45;
    const hlY = py - pupilR * .52;
    ctx.arc(hlX, hlY, pupilR * .38, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fill();
    ctx.restore();
  });
}

// ── Mouse tracking ──
document.addEventListener('mousemove', e => {
  cursorX = e.clientX;
  cursorY = e.clientY;
});

// ── Eye blink state ──
let blinking = false;
let blinkProgress = 0; // 0=open, 1=closed
let blinkDir = 1;

function triggerBlink() {
  blinking = true;
  blinkDir = 1;
}
// Random blink every 3-6 seconds
function scheduleBlink() {
  setTimeout(() => { triggerBlink(); scheduleBlink(); }, 3000 + Math.random() * 3000);
}
scheduleBlink();

// ── RAF: smooth cursor + draw ──
let lastTs2 = null;
requestAnimationFrame(function eyeLoop(ts) {
  if (!lastTs2) lastTs2 = ts;
  const dt = Math.min(ts - lastTs2, 50);
  lastTs2 = ts;

  // Smooth cursor lerp
  smoothX += (cursorX - smoothX) * .1;
  smoothY += (cursorY - smoothY) * .1;

  // Update img bounds every frame (handles scroll/resize)
  if (imgW === 0) updateImgBounds();

  // Blink animation
  if (blinking) {
    blinkProgress += blinkDir * (dt / 60);
    if (blinkProgress >= 1) { blinkProgress = 1; blinkDir = -1; }
    if (blinkProgress <= 0) { blinkProgress = 0; blinking = false; }
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (blinkProgress < 1) {
    drawEyes(smoothX, smoothY);
  }

  // Draw blink eyelids
  if (blinking) {
    const eyeR = imgW * EYE_R;
    EYES.forEach(eye => {
      const ex = eye.fx * imgW;
      const ey = eye.fy * imgH;
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(ex, ey, eyeR * 1.05, eyeR * 0.76 * blinkProgress, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#8B5E34'; // fur color
      ctx.fill();
      ctx.restore();
    });
  }

  requestAnimationFrame(eyeLoop);
});

// Sync canvas size if img loads late
setTimeout(updateImgBounds, 500);
setTimeout(updateImgBounds, 1200);


// ═══════════════════════════════════════════════════════
//  BODY + MOOD ANIMATION SYSTEM
// ═══════════════════════════════════════════════════════

const bubble = document.getElementById('bubble');

let bobT=0, lastTs=null;
let curRot=0, tgtRot=0;
let curLean=0, tgtLean=0;
let curScl=1, tgtScl=1;

let mood='happy', idleTimer=null, idleStage=0, onKapi=false;

const MOODS = {
  happy:    { cls:'e-happy',    text:'📖 Come read with me!',    rot:  0,  lean:  0,  scl:1.00 },
  wave:     { cls:'e-wave',     text:'👋 Hi there, bookworm!',   rot: 10,  lean: 12,  scl:1.03 },
  surprise: { cls:'e-surprise', text:'😲 Oh! You found me!',     rot: -7,  lean: -8,  scl:1.07 },
  grumpy:   { cls:'e-grumpy',   text:'😤 Come back here!',       rot:  5,  lean:  6,  scl:0.97 },
  sleepy:   { cls:'e-sleepy',   text:'😴 zzz… so many books…',  rot:  8,  lean:  3,  scl:0.94 },
};

function setMood(name, overrideLean) {
  if (mood === name) return;
  mood = name;
  const m = MOODS[name];
  img.className = m.cls;
  tgtRot  = m.rot;
  tgtLean = overrideLean !== undefined ? overrideLean : m.lean;
  tgtScl  = m.scl;
  showBubble(m.text);
}

function showBubble(txt) {
  bubble.textContent = txt;
  bubble.classList.add('show');
  clearTimeout(bubble._t);
  bubble._t = setTimeout(() => bubble.classList.remove('show'), 3000);
}

function resetIdle() {
  clearTimeout(idleTimer);
  idleStage = 0;
  bumpIdle();
}
function bumpIdle() {
  idleTimer = setTimeout(() => {
    idleStage++;
    if      (idleStage === 1) { setMood('wave'); doWave(); bumpIdle(); }
    else if (idleStage === 2) { setMood('grumpy'); bumpIdle(); }
    else if (idleStage >= 3)  { setMood('sleepy'); }
  }, 3800);
}
bumpIdle();

function doWave() {
  const seq = [15,-13,17,-11,14,-8,0];
  seq.forEach((v,i) => setTimeout(() => { tgtRot = v; }, i * 190));
}

document.addEventListener('mousemove', (e) => {
  resetIdle();
  const rect = scene.getBoundingClientRect();
  const cx = rect.left + rect.width  * .5;
  const cy = rect.top  + rect.height * .35;
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  const dist = Math.hypot(dx, dy);
  const dirLean = Math.max(-24, Math.min(24, (dx/380)*24));
  const dirRot  = Math.max(-20, Math.min(20, (dx/380)*20));

  if (onKapi) {
    mood=''; setMood('surprise');
  } else if (dist < 140) {
    mood=''; setMood('surprise', dirLean);
  } else if (dx < -220 && Math.abs(dy) < 200) {
    mood=''; setMood('grumpy', dirLean);
  } else if (dy < -200) {
    mood=''; setMood('wave', dirLean);
  } else {
    if (mood !== 'happy') { mood=''; setMood('happy', dirLean); }
    tgtRot  = dirRot;
    tgtLean = dirLean;
    tgtScl  = 1;
    return;
  }
  tgtRot  = dirRot;
  tgtLean = dirLean;
});

scene.addEventListener('mouseenter', () => { onKapi=true;  mood=''; setMood('surprise'); });
scene.addEventListener('mouseleave', () => { onKapi=false; mood=''; setMood('happy'); });
document.addEventListener('mouseleave', () => { tgtRot=0; tgtLean=0; tgtScl=1; });

// Body bob + lean RAF
const BA=7, BS=.0014, LR=.075;
requestAnimationFrame(function bodyLoop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min(ts-lastTs, 50);
  lastTs = ts;
  bobT += dt;
  const by = -Math.abs(Math.sin(bobT*BS)) * BA;
  curRot  += (tgtRot  - curRot)  * LR;
  curLean += (tgtLean - curLean) * LR;
  curScl  += (tgtScl  - curScl)  * LR;
  scene.style.transform =
    `translateX(calc(-50% + ${curLean.toFixed(1)}px))` +
    ` translateY(${by.toFixed(1)}px)` +
    ` rotate(${curRot.toFixed(2)}deg)` +
    ` scale(${curScl.toFixed(3)})`;
  requestAnimationFrame(bodyLoop);
});

// Show welcome bubble after load
setTimeout(() => showBubble(MOODS.happy.text), 1000);

// ═══════════════════════════════════════════════════════
function togglePw() {
  const i=document.getElementById('pw'), b=document.getElementById('pwBtn');
  i.type = i.type==='password' ? 'text' : 'password';
  b.textContent = i.type==='password' ? '👁️' : '🙈';
}

function doSignUp() {
  const fn=document.getElementById('fn').value.trim();
  const ln=document.getElementById('ln').value.trim();
  const em=document.getElementById('em').value.trim();
  const pw=document.getElementById('pw').value;
  const ok=document.getElementById('terms').checked;
  if (!fn||!ln||!em||!pw) return toast('⚠️ Please fill in all fields.');
  if (pw.length<8)         return toast('🔑 Password needs 8+ characters.');
  if (!ok)                 return toast('📜 Please agree to the Terms first.');
  toast(`🎉 Welcome, ${fn}! Your library awaits.`);
  mood=''; setMood('wave'); doWave();
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}
</script>
